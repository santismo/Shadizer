name: Deploy Shadizer to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Wait for the legacy branch publisher
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in $(seq 1 15); do
            status=$(curl --fail --silent \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs?head_sha=${{ github.sha }}&per_page=20" \
              | jq -r '[.workflow_runs[] | select(.name == "pages build and deployment")][0].status // "waiting"')
            echo "Legacy publisher: $status"
            if [ "$status" = "completed" ]; then
              exit 0
            fi
            sleep 4
          done
          echo "Legacy publisher was not detected; continuing with the Vite deployment."
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
